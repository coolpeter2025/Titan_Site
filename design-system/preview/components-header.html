<!doctype html><html><head><meta charset="utf-8"><title>Header Bar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;padding:0;color:#1a1f3a}
.top{background:#1f2547;color:#e5e7eb;font-size:11px;padding:7px 20px;display:flex;justify-content:space-between}
.top a{color:#e5e7eb;margin-right:14px}
.main{background:#333d7a;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 6px -1px rgba(26,31,58,.1)}
.logo{display:flex;align-items:center;gap:10px}
.mark{background:#fff;color:#333d7a;font-weight:800;font-size:14px;padding:4px 8px;border-radius:4px;letter-spacing:2px}
.name{font-weight:600;font-size:15px;line-height:1.1}
.kicker{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.70)}
.nav{display:flex;align-items:center;gap:22px;font-size:13px}
.nav a{color:rgba(255,255,255,.90);font-weight:500}
.cta{background:#ebeeff;color:#333d7a;font-weight:700;padding:8px 14px;border-radius:6px;font-size:12px}
</style></head>
<body>
<div class="top"><div><a>Tampa: <b>(727) 709-4141</b></a><a>Sarasota: <b>(727) 709-4141</b></a></div><div>License #CBC1264713</div></div>
<div class="main">
  <div class="logo"><div class="mark">TITAN</div><div><div class="name">Titan Homes Group</div><div class="kicker">Tampa's Trusted Remodelers</div></div></div>
  <div class="nav"><a>Home</a><a>About</a><a>Services</a><a>Areas Served</a><a>Contact</a><span class="cta">Free Consultation</span></div>
</div>
</body></html>
