<!doctype html><html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:20px 24px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:5px;font-size:12px}
.bar{background:#d9defc;height:12px;border-radius:2px}
.lbl{width:52px;font-weight:700;font-size:11px}
.val{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6b7280;width:50px}
.use{font-size:10px;color:#6b7280}
</style></head>
<body>
<div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div><div class="use">hair gap</div></div>
<div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div><div class="use">inline icon gap</div></div>
<div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div><div class="use">mobile gutter</div></div>
<div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px"></div><div class="val">24px</div><div class="use">desktop gutter, card pad</div></div>
<div class="row"><div class="lbl">space-8</div><div class="bar" style="width:32px"></div><div class="val">32px</div><div class="use">card inner</div></div>
<div class="row"><div class="lbl">space-12</div><div class="bar" style="width:48px"></div><div class="val">48px</div><div class="use">between intro + grid</div></div>
<div class="row"><div class="lbl">space-16</div><div class="bar" style="width:64px"></div><div class="val">64px</div><div class="use">section py mobile</div></div>
<div class="row"><div class="lbl">space-20</div><div class="bar" style="width:80px"></div><div class="val">80px</div><div class="use">section py desktop</div></div>
</body></html>
