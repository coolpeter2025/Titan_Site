<!doctype html><html><head><meta charset="utf-8"><title>Stat Tile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:24px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile{background:#ebeeff;border-radius:8px;padding:22px 18px;text-align:center}
.num{font-size:34px;font-weight:700;color:#333d7a;letter-spacing:-0.02em;margin-bottom:4px}
.lbl{font-size:12px;font-weight:500;color:#1a1f3a}
</style></head>
<body>
<div class="grid">
  <div class="tile"><div class="num">10+</div><div class="lbl">Years in Business</div></div>
  <div class="tile"><div class="num">350+</div><div class="lbl">Projects Completed</div></div>
  <div class="tile"><div class="num">20+</div><div class="lbl">Full-Time Pros</div></div>
  <div class="tile"><div class="num">5.0★</div><div class="lbl">Google Rating</div></div>
</div>
</body></html>
