<!doctype html><html><head><meta charset="utf-8"><title>Palette — Primary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.swatch{border-radius:8px;padding:14px;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(26,31,58,0.05)}
.name{font-size:13px;font-weight:700}
.hex{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:.8;letter-spacing:0.02em}
.var{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:.6;margin-top:2px}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#333d7a;color:#fff"><div class="name">Navy</div><div><div class="hex">#333D7A</div><div class="var">--navy</div></div></div>
  <div class="swatch" style="background:#2a315b;color:#fff"><div class="name">Navy Deep</div><div><div class="hex">#2A315B</div><div class="var">--navy-deep</div></div></div>
  <div class="swatch" style="background:#1f2547;color:#fff"><div class="name">Navy Darker</div><div><div class="hex">#1F2547</div><div class="var">--navy-darker</div></div></div>
  <div class="swatch" style="background:#ebeeff;color:#333d7a"><div class="name">Lavender</div><div><div class="hex">#EBEEFF</div><div class="var">--lavender</div></div></div>
  <div class="swatch" style="background:#d9defc;color:#333d7a"><div class="name">Lavender Hover</div><div><div class="hex">#D9DEFC</div><div class="var">--lavender-hover</div></div></div>
</div>
</body></html>
