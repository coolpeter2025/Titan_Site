<!doctype html><html><head><meta charset="utf-8"><title>Brand — Logo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;color:#1a1f3a;display:grid;grid-template-columns:1fr 1fr;min-height:240px}
.cell{display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:10px}
.light{background:#fff}
.dark{background:#333d7a}
.lock{display:flex;align-items:center;gap:10px}
.mark{font-weight:800;font-size:18px;padding:5px 10px;border-radius:5px;letter-spacing:2px}
.light .mark{background:#333d7a;color:#fff}
.dark .mark{background:#fff;color:#333d7a}
.txt{font-weight:600;font-size:17px;line-height:1.1}
.dark .txt{color:#fff}
.kick{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#6b7280;margin-top:2px}
.dark .kick{color:rgba(255,255,255,.70)}
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b7280}
.dark .lbl{color:rgba(255,255,255,.60)}
</style></head>
<body>
<div class="cell light">
  <div class="lbl">On light</div>
  <div class="lock"><div class="mark">TITAN</div><div><div class="txt">Titan Homes Group</div><div class="kick">Tampa's Trusted Remodelers</div></div></div>
</div>
<div class="cell dark">
  <div class="lbl">On navy</div>
  <div class="lock"><div class="mark">TITAN</div><div><div class="txt">Titan Homes Group</div><div class="kick">Tampa's Trusted Remodelers</div></div></div>
</div>
</body></html>
