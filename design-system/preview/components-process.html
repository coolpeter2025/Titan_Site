<!doctype html><html><head><meta charset="utf-8"><title>Process Step</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#333d7a;color:#fff;padding:26px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.step{text-align:center}
.dot{width:50px;height:50px;border-radius:9999px;background:#ebeeff;color:#333d7a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;margin:0 auto 12px}
.t{font-size:14px;font-weight:600;margin-bottom:5px}
.d{font-size:11px;line-height:1.5;color:rgba(255,255,255,.80)}
</style></head>
<body>
<div class="grid">
  <div class="step"><div class="dot">01</div><div class="t">Consultation &amp; Estimate</div><div class="d">We discuss vision, budget, timeline.</div></div>
  <div class="step"><div class="dot">02</div><div class="t">Design &amp; Planning</div><div class="d">Finalize materials and scope.</div></div>
  <div class="step"><div class="dot">03</div><div class="t">Construction</div><div class="d">Craftsmen bring it to life.</div></div>
  <div class="step"><div class="dot">04</div><div class="t">Final Walkthrough</div><div class="d">No payment until you&rsquo;re 100% happy.</div></div>
</div>
</body></html>
