<!doctype html><html><head><meta charset="utf-8"><title>Spacing — Radii</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;padding:20px 24px;color:#1a1f3a}
.row{display:flex;gap:16px;align-items:flex-end}
.item{text-align:center}
.box{background:#333d7a;width:72px;height:72px;margin-bottom:8px}
.name{font-size:11px;font-weight:700;color:#1a1f3a}
.val{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6b7280;margin-top:2px}
.use{font-size:10px;color:#6b7280;margin-top:2px}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">SM</div><div class="val">4px</div><div class="use">tags</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">Default</div><div class="val">6px</div><div class="use">buttons</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">LG</div><div class="val">8px</div><div class="use">cards</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">XL</div><div class="val">12px</div><div class="use">panels</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="name">Full</div><div class="val">pill</div><div class="use">step dots</div></div>
</div>
</body></html>
