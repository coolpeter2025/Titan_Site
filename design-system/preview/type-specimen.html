<!doctype html><html><head><meta charset="utf-8"><title>Type — Specimen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@400;600;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:24px}
.big{font-size:96px;font-weight:800;letter-spacing:-0.02em;color:#333d7a;line-height:1}
.name{font-size:13px;color:#6b7280;margin-top:10px;letter-spacing:0.04em}
.desc{font-size:12px;color:#6b7280;margin-top:3px}
.row{display:flex;gap:6px;margin-top:8px;font-size:14px;color:#1a1f3a}
.row span{border:1px solid #d9defc;padding:2px 8px;border-radius:4px}
</style></head>
<body>
<div class="big">Aa Gg</div>
<div class="name">GANTARI — GOOGLE FONTS</div>
<div class="desc">Humanist sans-serif · 6 weights · open apertures · subtly warm letterforms</div>
<div class="row"><span>ABCDEFGHIJKLM</span><span>0123456789</span><span>$ — · ★</span></div>
</body></html>
