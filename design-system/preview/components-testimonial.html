<!doctype html><html><head><meta charset="utf-8"><title>Testimonial Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:20px}
.card{background:#ebeeff;border:1px solid #d9defc;border-radius:8px;padding:22px;max-width:620px}
.stars{display:flex;gap:3px;margin-bottom:12px;color:#333d7a}
.stars svg{width:18px;height:18px}
.quote{font-size:14px;line-height:1.6;color:#1a1f3a;margin-bottom:18px}
.div{border-top:1px solid #d9defc;padding-top:14px}
.name{font-weight:700;color:#333d7a;font-size:14px}
.loc{font-size:12px;color:#6b7280}
.badge{display:inline-block;background:#333d7a;color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;font-weight:500;margin-top:8px}
</style></head>
<body>
<div class="card">
  <div class="stars">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/></svg>
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/></svg>
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/></svg>
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/></svg>
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/></svg>
  </div>
  <div class="quote">“Very professional, reliable, and always available. Titan Homes Group delivered exactly what they promised — on time and within budget. Our kitchen looks stunning.”</div>
  <div class="div">
    <div class="name">Paola F.</div>
    <div class="loc">Tampa, FL</div>
    <span class="badge">Kitchen Remodeling</span>
  </div>
</div>
</body></html>
