<!doctype html><html><head><meta charset="utf-8"><title>Type — Weights</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:20px 24px}
.row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:22px;letter-spacing:-0.01em}
.row:last-child{border:0}
.tag{margin-left:auto;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#6b7280;flex-shrink:0}
</style></head>
<body>
<div class="row" style="font-weight:400"><span>Gantari Regular</span><span class="tag">400 · body default</span></div>
<div class="row" style="font-weight:500"><span>Gantari Medium</span><span class="tag">500 · nav, tile labels</span></div>
<div class="row" style="font-weight:600"><span>Gantari Semibold</span><span class="tag">600 · all headings</span></div>
<div class="row" style="font-weight:700"><span>Gantari Bold</span><span class="tag">700 · CTAs, eyebrow</span></div>
<div class="row" style="font-weight:800"><span>Gantari Extrabold</span><span class="tag">800 · TITAN logo only</span></div>
</body></html>
