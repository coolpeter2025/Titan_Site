<!doctype html><html><head><meta charset="utf-8"><title>Hero</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;margin:0;color:#1a1f3a}
.hero{position:relative;background:url('https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?q=80&w=1800') center/cover;color:#fff;padding:38px 28px;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(42,49,91,.88) 0%,rgba(42,49,91,.72) 40%,rgba(42,49,91,.35) 100%)}
.c{position:relative;max-width:520px}
.h1{font-size:30px;font-weight:600;line-height:1.1;letter-spacing:-0.01em;margin-bottom:10px}
.sub{font-size:13px;line-height:1.55;color:rgba(255,255,255,.90);margin-bottom:16px}
.btns{display:flex;gap:8px}
.btn{padding:10px 18px;border-radius:6px;font-weight:700;font-size:13px}
.b1{background:#ebeeff;color:#333d7a}
.b2{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.7)}
.trust{position:relative;background:rgba(31,37,71,.80);backdrop-filter:blur(4px);border-top:1px solid rgba(255,255,255,.1);padding:10px 28px;color:rgba(255,255,255,.90);font-size:11px;font-weight:500;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
</style></head>
<body>
<div class="hero"><div class="c">
  <div class="h1">Tampa's Trusted Home Remodeling Experts</div>
  <div class="sub">Kitchen &amp; bath remodels, full home renovations, additions, and new construction — all under one licensed contractor.</div>
  <div class="btns"><span class="btn b1">Free Consultation</span><span class="btn b2">Call (727) 709-4141</span></div>
</div></div>
<div class="trust" style="background:#1f2547cc"><span>Licensed &amp; Insured · #CBC1264713</span><span>10+ Years in Tampa Bay</span><span>350+ Projects Completed</span><span>5.0★ Google Rating</span></div>
</body></html>
