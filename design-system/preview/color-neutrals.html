<!doctype html><html><head><meta charset="utf-8"><title>Palette — Neutrals</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gantari:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gantari',system-ui,sans-serif;background:#fff;color:#1a1f3a;padding:20px 24px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.swatch{border-radius:8px;padding:14px;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(26,31,58,0.06)}
.name{font-size:12px;font-weight:700}
.hex{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:.7}
.var{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:.5;margin-top:2px}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#1a1f3a;color:#fff"><div class="name">Ink</div><div><div class="hex">#1A1F3A</div><div class="var">--ink</div></div></div>
  <div class="swatch" style="background:#374151;color:#fff"><div class="name">Gray 700</div><div><div class="hex">#374151</div><div class="var">--gray-700</div></div></div>
  <div class="swatch" style="background:#6b7280;color:#fff"><div class="name">Muted</div><div><div class="hex">#6B7280</div><div class="var">--muted</div></div></div>
  <div class="swatch" style="background:#d1d5db;color:#1a1f3a"><div class="name">Gray 300</div><div><div class="hex">#D1D5DB</div><div class="var">--gray-300</div></div></div>
  <div class="swatch" style="background:#f3f4f6;color:#1a1f3a"><div class="name">Gray 100</div><div><div class="hex">#F3F4F6</div><div class="var">--gray-100</div></div></div>
  <div class="swatch" style="background:#fff;color:#1a1f3a;border:1px solid #d9defc"><div class="name">White</div><div><div class="hex">#FFFFFF</div><div class="var">--bg</div></div></div>
</div>
</body></html>
